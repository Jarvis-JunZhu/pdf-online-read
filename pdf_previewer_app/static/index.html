<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Uploader</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>PDF File Uploader</h1>
    </header>

    <main>
        <section id="upload-section">
            <h2>Upload a PDF</h2>
            <form id="upload-form">
                <div>
                    <label for="pdf-file-input">Choose PDF file (max 50MB):</label>
                    <input type="file" id="pdf-file-input" name="pdf_file" accept=".pdf" required>
                </div>
                <button type="submit" id="upload-button">Upload PDF</button>
            </form>
            <div id="upload-status">
                <progress id="upload-progress" value="0" max="100" style="display: none;"></progress>
                <div id="message-area"></div>
            </div>
        </section>

        <section id="pdf-list-section">
            <h2>Uploaded PDFs</h2>
            <p><a href="list.html">View All Uploaded PDFs</a></p>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 PDF Previewer App</p>
    </footer>

    <script src="js/upload.js"></script>
</body>
</html>
